<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>// TODO</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css"> <style>
        /* Keeping your core styles here for layout stability */
        :root {
            --bg:#0a0a0c; --surface:#111116; --surface2:#18181f; --border:#2a2a35;
            --accent:#7c6fff; --accent2:#ff6b6b; --green:#4dffb4;
            --text:#e8e8f0; --muted:#5a5a6e; --danger:#ff4444;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh;padding:40px 20px;overflow-x:hidden;}
        #authScreen{max-width:420px;margin:80px auto;display:none;}
        #appScreen{display:none;max-width:720px;margin:0 auto;}
        .add-form{display:flex;flex-direction:column;margin-bottom:24px;border:1px solid var(--border);background:var(--surface);}
        .add-form-top{display:flex;}
        .add-form input[type=text]{flex:1;background:none;border:none;color:var(--text);padding:13px 16px;outline:none;}
        .todo-item{background:var(--surface);border:1px solid transparent;display:grid;grid-template-columns:36px 1fr auto;margin-bottom:2px;position:relative;}
        .todo-desc{font-size:0.75rem;color:var(--muted);margin-top:6px;display:none;padding-left:10px;border-left:2px solid var(--border);}
        .todo-desc.open{display:block;}
        .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);padding:9px 18px;opacity:0;transition:0.2s;z-index:9999;}
        .toast.show{opacity:1;}
        /* ... (Add the rest of your CSS here or in style.css) ... */
    </style>
</head>
<body>

<div id="authScreen">
    <h2>// <span>TODO</span></h2>
    <p>Sign in to sync across devices or continue as a guest.</p>
    <div class="auth-btns">
        <button class="google-btn" id="btnGoogle">SIGN IN WITH GOOGLE</button>
        <button class="guest-btn" id="btnGuest">◈ CONTINUE AS GUEST</button>
    </div>
</div>

<div id="appScreen">
    <header>
        <div class="header-top">
            <h1>// <span>TODO</span></h1>
            <div class="stats" id="statsLabel">—</div>
            <div class="user-area">
                <div class="sync-dot" id="syncDot"></div>
                <span class="mode-badge" id="modeBadge">GUEST</span>
                <button class="hdr-btn danger" id="btnSignOut" style="display:none">SIGN OUT</button>
            </div>
        </div>
        <div class="toolbar">
            <button class="filter-btn active" data-f="all">ALL</button>
            <button class="filter-btn" data-f="active">ACTIVE</button>
            <button class="filter-btn" data-f="done">DONE</button>
            <button class="filter-btn" data-f="high">🔴 HIGH</button>
        </div>
    </header>

    <div class="search-wrap">
        <input class="search-inp" id="searchInp" placeholder="search tasks...">
    </div>

    <div class="add-form">
        <div class="add-form-top">
            <input type="text" id="newTask" placeholder="new task...">
            <select class="priority-select" id="newPri">
                <option value="low">LOW</option>
                <option value="medium" selected>MED</option>
                <option value="high">HIGH</option>
            </select>
            <button class="add-btn" id="btnAdd">+</button>
        </div>
        <textarea id="newDesc" placeholder="description..."></textarea>
    </div>

    <div class="todo-list" id="todoList"></div>

    <div class="bottom-bar" id="bottomBar" style="display:none">
        <span id="bottomCount"></span>
        <button class="clear-btn" id="btnClear">CLEAR COMPLETED</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="script.js"></script>
</body>
</html>
