<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>// TODO</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="site-banner" id="siteBanner" style="display:none">
  <div class="site-banner-title" id="siteBannerTitle">NOTICE</div>
  <div class="site-banner-text" id="siteBannerText"></div>
</div>

<div id="authScreen">
  <h2>// <span>TODO</span></h2>
  <p>Sign in to sync across devices — or continue as a guest with local storage and file attachments.</p>
  <div class="auth-btns">
    <button class="google-btn" id="btnGoogle">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      SIGN IN WITH GOOGLE (SYNC)
    </button>
    <div class="auth-divider">— OR —</div>
    <button class="guest-btn" id="btnGuest">◈ CONTINUE AS GUEST (LOCAL ONLY)</button>
  </div>
</div>

<div id="appScreen">
  <header>
    <div class="header-top">
      <h1>// <span>TODO</span></h1>
      <div class="stats" id="statsLabel">—</div>
      <div class="user-area">
        <div class="sync-dot" id="syncDot"></div>
        <img class="avatar" id="userAvatar" src="" alt="" style="display:none">
        <div class="avatar-ph" id="avatarPh">?</div>
        <span class="mode-badge guest-mode" id="modeBadge">GUEST</span>
        <button class="hdr-btn" id="btnUpgrade" style="display:none">↑ SIGN IN</button>
        <button class="hdr-btn danger" id="btnSignOut" style="display:none">SIGN OUT</button>
      </div>
    </div>
    <div class="storage-bar" id="storageBar">
      <div class="storage-label" id="storageLabel">—</div>
      <div class="storage-track"><div class="storage-fill" id="storageFill" style="width:0%"></div></div>
    </div>
    <div class="storage-bar" id="dbStorageBar">
      <div class="storage-label" id="dbStorageLabel">—</div>
      <div class="storage-track"><div class="storage-fill" id="dbStorageFill" style="width:0%"></div></div>
    </div>
    <div class="usage-panel" id="globalUsagePanel" style="display:none">
      <div class="usage-panel-title">GLOBAL USAGE</div>
      <div class="usage-panel-row">
        <span class="usage-panel-key">attachment storage</span>
        <span class="usage-panel-val" id="globalAttachmentBytes">—</span>
      </div>
      <div class="usage-panel-row">
        <span class="usage-panel-key">total todos</span>
        <span class="usage-panel-val" id="globalTodoCount">—</span>
      </div>
      <div class="usage-panel-row">
        <span class="usage-panel-key">total attachments</span>
        <span class="usage-panel-val" id="globalAttachmentCount">—</span>
      </div>
      <div class="usage-panel-row">
        <span class="usage-panel-key">total users</span>
        <span class="usage-panel-val" id="globalUserCount">—</span>
      </div>
      <div class="usage-panel-block">
        <div class="usage-panel-subtitle">Biggest Storage Users</div>
        <div class="usage-panel-list" id="topStorageUsers">—</div>
      </div>
      <div class="usage-panel-block">
        <div class="usage-panel-subtitle">File Types</div>
        <div class="usage-panel-list" id="fileTypeBreakdown">—</div>
      </div>
      <div class="usage-panel-block">
        <div class="usage-panel-subtitle">Site Notice</div>
        <label class="usage-toggle">
          <input type="checkbox" id="noticeEnabled">
          <span>enable maintenance/announcement banner</span>
        </label>
        <textarea class="usage-textarea" id="noticeText" rows="3" maxlength="500" placeholder="Write a maintenance notice or announcement..."></textarea>
        <button class="usage-save-btn" id="saveNoticeBtn">SAVE NOTICE</button>
      </div>
    </div>
    <div class="toolbar">
      <button class="filter-btn active" data-f="all">ALL</button>
      <button class="filter-btn" data-f="active">ACTIVE</button>
      <button class="filter-btn" data-f="done">DONE</button>
      <button class="filter-btn" data-f="high">🔴 HIGH</button>
      <button class="io-btn" id="btnExport">↑ EXPORT</button>
      <button class="io-btn" id="btnImport">↓ IMPORT</button>
      <button class="io-btn warn-btn" id="btnClearAtts" style="display:none">🗑 CLEAR DONE ATTS</button>
      <input type="file" id="importFile" accept=".json">
    </div>
  </header>

  <div class="search-wrap">
    <input class="search-inp" id="searchInp" placeholder="search tasks..." autocomplete="off">
    <button class="search-clear" id="searchClear">×</button>
  </div>

  <div class="add-form">
    <div class="add-form-top">
      <input type="text" id="newTask" placeholder="new task..." maxlength="300" autocomplete="off">
      <select class="priority-select" id="newPri">
        <option value="low">LOW</option>
        <option value="medium" selected>MED</option>
        <option value="high">HIGH</option>
      </select>
      <button class="add-btn" id="btnAdd">+</button>
    </div>
    <textarea id="newDesc" placeholder="description (optional)..." maxlength="1000" rows="1"></textarea>
  </div>

  <div class="todo-list" id="todoList"></div>

  <div class="bottom-bar" id="bottomBar" style="display:none">
    <span id="bottomCount"></span>
    <button class="clear-btn" id="btnClear">CLEAR COMPLETED</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="script.js"></script>
</body>
</html>
