<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>// TODO</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg:#0a0a0c; --surface:#111116; --surface2:#18181f; --border:#2a2a35;
    --accent:#7c6fff; --accent2:#ff6b6b; --green:#4dffb4;
    --text:#e8e8f0; --muted:#5a5a6e; --danger:#ff4444;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh;padding:40px 20px;overflow-x:hidden;}
  body::before{content:'';position:fixed;top:-200px;left:-200px;width:500px;height:500px;background:radial-gradient(circle,rgba(124,111,255,0.08) 0%,transparent 70%);pointer-events:none;animation:drift 12s ease-in-out infinite alternate;}
  @keyframes drift{to{transform:translate(80px,120px);}}

  /* ── AUTH SCREEN ── */
  #authScreen{max-width:420px;margin:80px auto;}
  #authScreen h2{font-family:'Syne',sans-serif;font-size:2.2rem;font-weight:800;margin-bottom:6px;}
  #authScreen h2 span{color:var(--accent);}
  #authScreen p{font-size:0.75rem;color:var(--muted);margin-bottom:32px;line-height:1.7;}
  .auth-btns{display:flex;flex-direction:column;gap:10px;}
  .google-btn{display:inline-flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:0.82rem;padding:14px 24px;cursor:pointer;letter-spacing:0.06em;transition:border-color 0.15s,background 0.15s;width:100%;justify-content:center;}
  .google-btn:hover{border-color:var(--accent);background:var(--surface2);}
  .google-btn svg{width:18px;height:18px;flex-shrink:0;}
  .guest-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:none;border:1px dashed var(--border);color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:0.78rem;padding:12px 24px;cursor:pointer;letter-spacing:0.06em;transition:border-color 0.15s,color 0.15s;width:100%;}
  .guest-btn:hover{border-color:var(--muted);color:var(--text);}
  .auth-divider{text-align:center;font-size:0.65rem;color:var(--muted);letter-spacing:0.1em;margin:4px 0;}

  /* ── APP ── */
  #appScreen{display:none;max-width:720px;margin:0 auto;}

  header{margin-bottom:40px;}
  .header-top{display:flex;align-items:center;gap:10px;margin-bottom:4px;flex-wrap:wrap;}
  h1{font-family:'Syne',sans-serif;font-size:2.4rem;font-weight:800;letter-spacing:-0.04em;}
  h1 span{color:var(--accent);}
  .stats{font-size:0.7rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;flex:1;}

  .user-area{display:flex;align-items:center;gap:8px;}
  .avatar{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);object-fit:cover;}
  .avatar-ph{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:0.6rem;color:var(--muted);}
  .mode-badge{font-size:0.6rem;letter-spacing:0.1em;padding:3px 8px;border:1px solid var(--border);color:var(--muted);text-transform:uppercase;}
  .mode-badge.synced-mode{border-color:var(--green);color:var(--green);}
  .mode-badge.guest-mode{border-color:var(--muted);color:var(--muted);}

  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);transition:background 0.3s;flex-shrink:0;}
  .sync-dot.syncing{background:var(--accent);animation:pulse 0.7s ease-in-out infinite alternate;}
  .sync-dot.ok{background:var(--green);}
  .sync-dot.err{background:var(--danger);}
  @keyframes pulse{to{opacity:0.2;}}

  .hdr-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:0.62rem;padding:5px 10px;cursor:pointer;letter-spacing:0.06em;transition:all 0.15s;}
  .hdr-btn:hover{border-color:var(--accent);color:var(--accent);}
  .hdr-btn.danger:hover{border-color:var(--danger);color:var(--danger);}

  .toolbar{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
  .filter-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:0.7rem;padding:6px 14px;cursor:pointer;letter-spacing:0.08em;text-transform:uppercase;transition:all 0.15s;}
  .filter-btn:hover{border-color:var(--accent);color:var(--accent);}
  .filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(124,111,255,0.1);}
  .io-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:0.7rem;padding:6px 14px;cursor:pointer;letter-spacing:0.08em;text-transform:uppercase;transition:all 0.15s;}
  .io-btn:hover{border-color:var(--green);color:var(--green);}

  /* ── ADD FORM ── */
  .add-form{display:flex;flex-direction:column;margin-bottom:28px;border:1px solid var(--border);background:var(--surface);transition:border-color 0.2s;}
  .add-form:focus-within{border-color:var(--accent);}
  .add-form-top{display:flex;}
  .add-form input[type=text]{flex:1;background:none;border:none;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:0.9rem;padding:13px 16px;outline:none;}
  .add-form input::placeholder{color:var(--muted);}
  .priority-select{background:none;border:none;border-left:1px solid var(--border);color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:0.7rem;padding:13px 10px;cursor:pointer;outline:none;}
  .priority-select option{background:#18181f;}
  .add-btn{background:var(--accent);border:none;color:white;font-family:'JetBrains Mono',monospace;font-size:1.1rem;padding:13px 20px;cursor:pointer;transition:background 0.15s,transform 0.1s;}
  .add-btn:hover{background:#9d8fff;}
  .add-btn:active{transform:scale(0.96);}
  #newDesc{background:none;border:none;border-top:1px solid var(--border);color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:0.78rem;padding:10px 16px;outline:none;resize:none;width:100%;line-height:1.6;max-height:120px;overflow-y:auto;}

  /* ── TODO LIST ── */
  .todo-list{display:flex;flex-direction:column;gap:2px;}
  .todo-item{background:var(--surface);border:1px solid transparent;display:grid;grid-template-columns:36px 1fr auto;align-items:start;transition:border-color 0.15s,background 0.15s;animation:slideIn 0.2s ease;position:relative;}
  @keyframes slideIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
  .todo-item:hover{border-color:var(--border);background:var(--surface2);}
  .todo-item.done{opacity:0.42;}

  .pbar{width:3px;position:absolute;left:0;top:0;bottom:0;}
  .pbar.high{background:var(--accent2);}
  .pbar.medium{background:var(--accent);}
  .pbar.low{background:var(--muted);}

  .check-area{display:flex;align-items:flex-start;justify-content:center;cursor:pointer;padding:16px 0 14px 14px;}
  .check-box{width:16px;height:16px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;margin-top:1px;}
  .todo-item:hover .check-box{border-color:var(--accent);}
  .todo-item.done .check-box{background:var(--accent);border-color:var(--accent);}
  .check-box::after{content:'✓';color:white;font-size:0.65rem;display:none;}
  .todo-item.done .check-box::after{display:block;}

  .todo-body{padding:13px 12px;min-width:0;}
  .todo-text{font-size:0.88rem;color:var(--text);word-break:break-word;line-height:1.5;}
  .todo-item.done .todo-text{text-decoration:line-through;color:var(--muted);}
  .todo-meta{font-size:0.62rem;color:var(--muted);margin-top:3px;letter-spacing:0.05em;}

  .todo-actions{display:flex;align-items:flex-start;padding:8px 6px 0 0;opacity:0;transition:opacity 0.15s;}
  .todo-item:hover .todo-actions{opacity:1;}
  .act{background:none;border:none;color:var(--muted);font-size:0.68rem;padding:5px 7px;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:color 0.15s;letter-spacing:0.05em;white-space:nowrap;}
  .act:hover{color:var(--accent);}
  .act.del:hover{color:var(--danger);}

  /* Edit */
  .edit-inp{background:none;border:none;border-bottom:1px solid var(--accent);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:0.88rem;outline:none;width:100%;padding:2px 0;}
  .edit-desc-ta{background:none;border:none;border-bottom:1px solid var(--border);color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:0.78rem;outline:none;width:100%;padding:4px 0;margin-top:6px;resize:none;line-height:1.5;min-height:44px;}
  .edit-desc-ta:focus{border-bottom-color:var(--accent);color:var(--text);}

  /* Expand */
  .expand-row{display:flex;gap:12px;margin-top:4px;flex-wrap:wrap;}
  .expand-btn{background:none;border:none;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:0.62rem;padding:2px 0;cursor:pointer;letter-spacing:0.06em;display:inline-flex;align-items:center;gap:4px;transition:color 0.15s;opacity:0;}
  .todo-item:hover .expand-btn,.expand-btn.vis{opacity:1;}
  .expand-btn:hover{color:var(--accent);}
  .expand-btn .arr{display:inline-block;transition:transform 0.2s;font-style:normal;}
  .expand-btn.open .arr{transform:rotate(90deg);}

  /* Description */
  .todo-desc{font-size:0.75rem;color:var(--muted);margin-top:6px;line-height:1.6;white-space:pre-wrap;word-break:break-word;border-left:2px solid var(--border);padding-left:10px;display:none;}
  .todo-desc.open{display:block;}

  /* Attachments panel */
  .att-panel{margin-top:10px;display:none;}
  .att-panel.open{display:block;}
  .att-list{display:flex;flex-direction:column;gap:3px;margin-bottom:8px;}
  .att-row{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);padding:6px 10px;font-size:0.7rem;}
  .att-icon{flex-shrink:0;}
  .att-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;color:var(--text);}
  .att-name:hover{color:var(--accent);text-decoration:underline;}
  .att-size{color:var(--muted);font-size:0.62rem;flex-shrink:0;}
  .att-rm{background:none;border:none;color:var(--muted);cursor:pointer;padding:0 2px;font-size:0.8rem;transition:color 0.15s;flex-shrink:0;}
  .att-rm:hover{color:var(--danger);}
  .att-img{width:100%;max-height:150px;object-fit:cover;border:1px solid var(--border);margin-top:3px;display:block;cursor:pointer;}
  .att-upload-row{display:flex;gap:8px;flex-wrap:wrap;}
  .att-up-btn{background:none;border:1px dashed var(--border);color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:0.62rem;padding:5px 12px;cursor:pointer;letter-spacing:0.06em;transition:all 0.15s;}
  .att-up-btn:hover{border-color:var(--accent);color:var(--accent);}
  .att-prog{font-size:0.62rem;color:var(--accent);letter-spacing:0.06em;display:none;align-self:center;}

  /* Empty */
  .empty{text-align:center;padding:60px 0;color:var(--muted);}
  .empty .big{font-size:2.8rem;margin-bottom:10px;}
  .empty p{font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;}

  /* Bottom bar */
  .bottom-bar{display:flex;justify-content:space-between;align-items:center;margin-top:20px;padding-top:14px;border-top:1px solid var(--border);font-size:0.68rem;color:var(--muted);}
  .clear-btn{background:none;border:none;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:0.68rem;cursor:pointer;letter-spacing:0.06em;transition:color 0.15s;}
  .clear-btn:hover{color:var(--danger);}

  /* Toast */
  .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--surface2);border:1px solid var(--border);color:var(--green);font-family:'JetBrains Mono',monospace;font-size:0.72rem;padding:9px 18px;letter-spacing:0.08em;opacity:0;transition:opacity 0.2s,transform 0.2s;pointer-events:none;white-space:nowrap;z-index:999;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}



  input[type=file]{display:none;}
</style>
</head>
<body>


<div id="authScreen">
  <h2>// <span>TODO</span></h2>
  <p>Sign in to sync across devices with real-time CDS and Google Drive attachments — or continue as a guest using local storage with import/export.</p>
  <div class="auth-btns">
    <button class="google-btn" id="btnGoogle">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      SIGN IN WITH GOOGLE (SYNC + DRIVE)
    </button>
    <div class="auth-divider">— OR —</div>
    <button class="guest-btn" id="btnGuest">◈ CONTINUE AS GUEST (LOCAL ONLY)</button>
  </div>
</div>

<!-- Main app -->
<div id="appScreen">
  <header>
    <div class="header-top">
      <h1>// <span>TODO</span></h1>
      <div class="stats" id="statsLabel">—</div>
      <div class="user-area">
        <div class="sync-dot" id="syncDot"></div>
        <img class="avatar" id="userAvatar" src="" alt="" style="display:none">
        <div class="avatar-ph" id="avatarPh">?</div>
        <span class="mode-badge" id="modeBadge">GUEST</span>
        <button class="hdr-btn" id="btnUpgrade" style="display:none">↑ SIGN IN</button>
        <button class="hdr-btn danger" id="btnSignOut" style="display:none">SIGN OUT</button>
      </div>
    </div>
    <div class="toolbar">
      <button class="filter-btn active" data-f="all">ALL</button>
      <button class="filter-btn" data-f="active">ACTIVE</button>
      <button class="filter-btn" data-f="done">DONE</button>
      <button class="io-btn" id="btnExport">↑ EXPORT</button>
      <button class="io-btn" id="btnImport">↓ IMPORT</button>

    </div>
  </header>

  <div class="add-form">
    <div class="add-form-top">
      <input type="text" id="newTask" placeholder="new task..." maxlength="300" autocomplete="off">
      <select class="priority-select" id="newPri">
        <option value="low">LOW</option>
        <option value="medium" selected>MED</option>
        <option value="high">HIGH</option>
      </select>
      <button class="add-btn" id="btnAdd">+</button>
    </div>
    <textarea id="newDesc" placeholder="description (optional)..." maxlength="1000" rows="1"></textarea>
  </div>

  <div class="todo-list" id="todoList"></div>

  <div class="bottom-bar" id="bottomBar" style="display:none">
    <span id="bottomCount"></span>
    <button class="clear-btn" id="btnClear">CLEAR COMPLETED</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONFIG — keys hardcoded, no setup screen needed
// ─────────────────────────────────────────────────────────────────────────────
const SUPA_URL = 'https://hxkjwebubmdqjzwmnvrh.supabase.co';
const SUPA_KEY = 'sb_publishable_iZkIPeb7P6Eb8RCXC1hNOQ_GhIUlnj0';

// ─────────────────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────────────────
let sb = null;
let mode = 'guest'; // 'guest' | 'synced'
let currentUser = null;
let todos = [];
let attMap = {}; // todoId -> [{id,name,size,mime,url,path?,driveId?}]
let filter = 'all';
let editingId = null;
let expandedIds = new Set();
let openAttIds = new Set();
let realtimeCh = null;

const LS_TODOS = 'todo_v2_todos';
const LS_ATTS  = 'todo_v2_atts';

// ─────────────────────────────────────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────────────────────────────────────
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const fmtDate = iso => new Date(iso).toLocaleDateString('en-GB',{day:'2-digit',month:'short'}).toUpperCase();
const fmtSize = b => b<1024?b+'B':b<1048576?(b/1024).toFixed(1)+'KB':(b/1048576).toFixed(1)+'MB';
const mimeIcon = m => m.startsWith('image/')?'🖼':m==='application/pdf'?'📄':m.startsWith('video/')?'🎬':m.startsWith('audio/')?'🎵':m.includes('zip')?'🗜':'📎';

let toastTimer;
function toast(msg,col){
  const el=document.getElementById('toast');
  el.textContent='// '+msg;
  el.style.color=col||'var(--green)';
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2600);
}

function dot(s){document.getElementById('syncDot').className='sync-dot '+s;}

function show(id){const el=document.getElementById(id);if(el)el.style.display='block';}
function hide(id){const el=document.getElementById(id);if(el)el.style.display='none';}

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
async function init(){
  try {
    sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);
  } catch(e) {
    return; // Supabase failed to load — guest mode still works
  }

  // When Supabase redirects back after OAuth it puts the token in the URL hash.
  // In a plain HTML file we need to explicitly tell Supabase to pick it up.
  if(window.location.hash && window.location.hash.includes('access_token')){
    // Strip any doubled ## that can happen with GitHub Pages root repos
    const hash = window.location.hash.replace(/^#+/, '#');
    const params = new URLSearchParams(hash.slice(1));
    const accessToken = params.get('access_token');
    const refreshToken = params.get('refresh_token');
    if(accessToken && refreshToken){
      const {data, error} = await sb.auth.setSession({
        access_token: accessToken,
        refresh_token: refreshToken
      });
      if(!error && data.session){
        // Clean the URL
        history.replaceState(null, '', window.location.pathname);
        await enterSyncedMode(data.session.user);
        return;
      }
    }
  }

  const {data:{session}} = await sb.auth.getSession();
  if(session){ await enterSyncedMode(session.user); }

  sb.auth.onAuthStateChange(async(event,session)=>{
    if(event==='SIGNED_IN'&&session){ hide('authScreen'); await enterSyncedMode(session.user); }
    if(event==='SIGNED_OUT'){ leaveSyncedMode(); }
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// GUEST MODE
// ─────────────────────────────────────────────────────────────────────────────
function enterGuestMode(){
  mode='guest'; currentUser=null;
  hide('authScreen'); show('appScreen');
  const badge=document.getElementById('modeBadge');
  badge.textContent='GUEST'; badge.className='mode-badge guest-mode';
  document.getElementById('btnUpgrade').style.display='inline-block';
  document.getElementById('btnSignOut').style.display='none';
  document.getElementById('userAvatar').style.display='none';
  document.getElementById('avatarPh').textContent='?';
  document.getElementById('syncDot').className='sync-dot';
  loadGuest();
}

function loadGuest(){
  try{ todos=JSON.parse(localStorage.getItem(LS_TODOS)||'[]'); }catch{ todos=[]; }
  try{ attMap=JSON.parse(localStorage.getItem(LS_ATTS)||'{}'); }catch{ attMap={}; }
  render();
}

function saveGuest(){
  // Don't save base64 blobs > 4MB total to avoid LS quota errors
  const safeAtts = {};
  for(const [k,v] of Object.entries(attMap)){
    safeAtts[k]=v.map(a=>{
      if(a.dataUrl && a.dataUrl.length>3*1024*1024) return {...a,dataUrl:null,error:'too large to cache'};
      return a;
    });
  }
  try{
    localStorage.setItem(LS_TODOS,JSON.stringify(todos));
    localStorage.setItem(LS_ATTS,JSON.stringify(safeAtts));
  }catch(e){
    // LS full — save todos only
    try{ localStorage.setItem(LS_TODOS,JSON.stringify(todos)); }catch{}
    toast('storage full — attachments not cached locally','var(--accent2)');
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// SYNCED MODE
// ─────────────────────────────────────────────────────────────────────────────
async function enterSyncedMode(user){
  mode='synced'; currentUser=user;
  hide('authScreen'); show('appScreen');
  const badge=document.getElementById('modeBadge');
  badge.textContent='SYNCED'; badge.className='mode-badge synced-mode';
  hide('btnUpgrade'); show('btnSignOut');
  const av=document.getElementById('userAvatar');
  const ph=document.getElementById('avatarPh');
  if(user.user_metadata?.avatar_url){av.src=user.user_metadata.avatar_url;show('userAvatar');ph.style.display='none';}
  else{ph.textContent=(user.email||'?')[0].toUpperCase();}
  await loadSynced();
  subscribeRealtime();
}

function leaveSyncedMode(){
  mode='guest'; currentUser=null;
  todos=[]; attMap={};
  if(realtimeCh){sb.removeChannel(realtimeCh); realtimeCh=null;}
  hide('appScreen'); show('authScreen');
}

async function loadSynced(){
  dot('syncing');
  const [{data:tData,error:tErr},{data:aData}] = await Promise.all([
    sb.from('todos').select('*').order('created',{ascending:false}),
    sb.from('attachments').select('*').order('created',{ascending:true})
  ]);
  if(tErr){dot('err');toast('load error: '+tErr.message,'var(--danger)');return;}
  todos=(tData||[]).map(t=>({...t, desc: t.description||''}));
  attMap={};
  (aData||[]).forEach(a=>{
    (attMap[a.todo_id]=attMap[a.todo_id]||[]).push({
      id:a.id, name:a.name, size:a.size, mime:a.mime_type,
      path:a.path, driveId:a.drive_id||null, driveUrl:a.drive_url||null
    });
  });
  dot('ok'); render();
}

function subscribeRealtime(){
  if(realtimeCh) sb.removeChannel(realtimeCh);
  realtimeCh=sb.channel('rt-todos')
    .on('postgres_changes',{event:'*',schema:'public',table:'todos'},loadSynced)
    .on('postgres_changes',{event:'*',schema:'public',table:'attachments'},loadSynced)
    .subscribe();
}

// ─────────────────────────────────────────────────────────────────────────────
// CRUD — unified, dispatches by mode
// ─────────────────────────────────────────────────────────────────────────────
async function addTodo(text,priority,desc){
  text=text.trim(); if(!text) return;
  if(mode==='guest'){
    todos.unshift({id:uid(),text,desc:desc.trim(),priority,done:false,created:new Date().toISOString()});
    saveGuest(); render();
  } else {
    dot('syncing');
    const {error}=await sb.from('todos').insert({user_id:currentUser.id,text,description:desc.trim(),priority,done:false});
    if(error){dot('err');toast('add failed','var(--danger)');}else dot('ok');
    // realtime picks it up
  }
}

async function toggleDone(id){
  const t=todos.find(t=>t.id===id); if(!t) return;
  if(mode==='guest'){t.done=!t.done;saveGuest();render();}
  else{
    t.done=!t.done; render(); // optimistic
    dot('syncing');
    const {error}=await sb.from('todos').update({done:t.done,updated:new Date().toISOString()}).eq('id',id);
    if(error){t.done=!t.done;dot('err');toast('update failed','var(--danger)');render();}else dot('ok');
  }
}

async function deleteTodo(id){
  if(mode==='guest'){
    todos=todos.filter(t=>t.id!==id); delete attMap[id]; saveGuest(); render();
  } else {
    dot('syncing');
    for(const a of (attMap[id]||[])){
      if(a.path) await sb.storage.from('attachments').remove([a.path]);
    }
    const {error}=await sb.from('todos').delete().eq('id',id);
    if(error){dot('err');toast('delete failed','var(--danger)');return;}
    todos=todos.filter(t=>t.id!==id); delete attMap[id]; render(); dot('ok');
  }
}

async function commitEdit(id,text,desc){
  text=text.trim(); if(!text){editingId=null;render();return;}
  if(mode==='guest'){
    const t=todos.find(t=>t.id===id);
    if(t){t.text=text;t.desc=desc.trim();}
    editingId=null; saveGuest(); render();
  } else {
    dot('syncing');
    const {error}=await sb.from('todos').update({text,description:desc.trim(),updated:new Date().toISOString()}).eq('id',id);
    if(error){dot('err');toast('save failed','var(--danger)');return;}
    const t=todos.find(t=>t.id===id);
    if(t){t.text=text;t.desc=desc.trim();}
    editingId=null; render(); dot('ok');
  }
}

async function clearDone(){
  const ids=todos.filter(t=>t.done).map(t=>t.id); if(!ids.length) return;
  if(mode==='guest'){
    todos=todos.filter(t=>!t.done);
    ids.forEach(id=>delete attMap[id]);
    saveGuest(); render(); toast('completed cleared');
  } else {
    dot('syncing');
    for(const id of ids) for(const a of (attMap[id]||[])) if(a.path) await sb.storage.from('attachments').remove([a.path]);
    await sb.from('todos').delete().in('id',ids);
    todos=todos.filter(t=>!t.done);
    ids.forEach(id=>delete attMap[id]);
    render(); dot('ok'); toast('completed cleared');
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// ATTACHMENTS
// ─────────────────────────────────────────────────────────────────────────────

// ── Guest: store as base64 in memory/LS ──
async function guestUpload(todoId, file){
  if(file.size > 5*1024*1024){toast('guest mode: max 5MB per file','var(--accent2)');return;}
  const reader=new FileReader();
  reader.onload=ev=>{
    const att={id:uid(),name:file.name,size:file.size,mime:file.type,dataUrl:ev.target.result};
    (attMap[todoId]=attMap[todoId]||[]).push(att);
    saveGuest(); render();
    toast('attached '+file.name);
  };
  reader.readAsDataURL(file);
}

function guestDeleteAtt(todoId, attId){
  if(attMap[todoId]) attMap[todoId]=attMap[todoId].filter(a=>a.id!==attId);
  saveGuest(); render(); toast('removed');
}

// ── Synced: Supabase Storage ──
async function syncedUpload(todoId, file){
  if(file.size>20*1024*1024){toast('max 20MB','var(--accent2)');return;}
  const ext=file.name.split('.').pop();
  const path=`${currentUser.id}/${todoId}/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
  dot('syncing');
  const {error:upErr}=await sb.storage.from('attachments').upload(path,file);
  if(upErr){dot('err');toast('upload failed: '+upErr.message,'var(--danger)');return;}
  const {error:dbErr}=await sb.from('attachments').insert({
    todo_id:todoId,user_id:currentUser.id,name:file.name,size:file.size,mime_type:file.type,path
  });
  if(dbErr){dot('err');toast('record failed','var(--danger)');return;}
  dot('ok'); toast('uploaded '+file.name);
}

async function syncedDeleteAtt(att){
  dot('syncing');
  if(att.path) await sb.storage.from('attachments').remove([att.path]);
  await sb.from('attachments').delete().eq('id',att.id);
  if(attMap[att.todoId]) attMap[att.todoId]=attMap[att.todoId].filter(a=>a.id!==att.id);
  render(); dot('ok'); toast('removed');
}

async function getSignedUrl(path){
  const {data}=await sb.storage.from('attachments').createSignedUrl(path,300);
  return data?.signedUrl||null;
}

function findAtt(attId){
  for(const arr of Object.values(attMap)){const a=arr.find(a=>a.id===attId);if(a)return a;}
  return null;
}

async function openAtt(attId){
  const a=findAtt(attId); if(!a) return;
  if(a.dataUrl){window.open(a.dataUrl,'_blank');return;}
  if(a.driveUrl){window.open(a.driveUrl,'_blank');return;}
  if(a.path){
    const url=await getSignedUrl(a.path);
    if(url) window.open(url,'_blank');
    else toast('could not get download URL','var(--danger)');
    return;
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────────────────────
function render(){
  const list = filter==='active'?todos.filter(t=>!t.done):filter==='done'?todos.filter(t=>t.done):todos;
  const done=todos.filter(t=>t.done).length;
  document.getElementById('statsLabel').textContent=`${todos.length-done} active · ${done} done`;
  const bb=document.getElementById('bottomBar');
  bb.style.display=todos.length?'flex':'none';
  document.getElementById('bottomCount').textContent=`${todos.length} total`;

  const tl=document.getElementById('todoList');
  if(!list.length){
    tl.innerHTML=`<div class="empty"><div class="big">${filter==='done'?'☐':'◈'}</div><p>${filter==='done'?'nothing done yet':filter==='active'?'all caught up':'add your first task'}</p></div>`;
    return;
  }
  tl.innerHTML='';
  list.forEach(t=>{ tl.appendChild(buildItem(t)); });
  bindEvents(tl);
  loadImgPreviews(tl);
}

function buildItem(t){
  const isEdit=editingId===t.id;
  const isExpanded=expandedIds.has(t.id);
  const isAttOpen=openAttIds.has(t.id);
  const hasDesc=!!(t.desc&&t.desc.trim());
  const atts=attMap[t.id]||[];

  const div=document.createElement('div');
  div.className='todo-item'+(t.done?' done':'');
  div.dataset.id=t.id;

  let body;
  if(isEdit){
    body=`
      <input class="edit-inp" value="${esc(t.text)}" data-id="${t.id}">
      <textarea class="edit-desc-ta" data-id="${t.id}" rows="2" placeholder="description...">${esc(t.desc||'')}</textarea>
    `;
  } else {
    const attBadge=atts.length?` · 📎 ${atts.length}`:'';
    const descBtn=`<button class="expand-btn${hasDesc?' vis':''}${isExpanded?' open':''}" data-role="desc" data-id="${t.id}"><i class="arr">▶</i> ${hasDesc?(isExpanded?'hide':'notes'):'+ note'}</button>`;
    const attLabel=isAttOpen?'hide':(atts.length?'files ('+atts.length+')':'files');
    const attBtn=`<button class="expand-btn${atts.length?' vis':''}${isAttOpen?' open':''}" data-role="att" data-id="${t.id}"><i class="arr">▶</i> ${attLabel}</button>`;
    body=`
      <span class="todo-text">${esc(t.text)}</span>
      <div class="todo-meta">${t.priority.toUpperCase()} · ${fmtDate(t.created)}${attBadge}</div>
      <div class="expand-row">${descBtn}${attBtn}</div>
      ${hasDesc?`<div class="todo-desc${isExpanded?' open':''}">${esc(t.desc)}</div>`:''}
      ${isAttOpen?buildAttPanel(t.id,atts):''}
    `;
  }

  div.innerHTML=`
    <div class="pbar ${t.priority}"></div>
    <div class="check-area" data-id="${t.id}"><div class="check-box"></div></div>
    <div class="todo-body">${body}</div>
    <div class="todo-actions">
      ${isEdit
        ?`<button class="act save-btn" data-id="${t.id}">SAVE</button><button class="act cancel-btn">×</button>`
        :`<button class="act edit-btn" data-id="${t.id}">EDIT</button><button class="act del del-btn" data-id="${t.id}">DEL</button>`
      }
    </div>
  `;
  return div;
}

function buildAttPanel(todoId,atts){
  const items=atts.map(a=>{
    const isImg=(a.mime||'').startsWith('image/');
    const imgTag = isImg && a.dataUrl
      ? '<img class="att-img" src="'+esc(a.dataUrl)+'" alt="'+esc(a.name)+'" data-att="'+a.id+'">'
      : isImg && a.path
      ? '<img class="att-img" data-path="'+esc(a.path)+'" src="" alt="'+esc(a.name)+'" data-att="'+a.id+'">'
      : '';
    return '<div class="att-row">'
      + '<span class="att-icon">'+mimeIcon(a.mime||'')+'</span>'
      + '<span class="att-name" data-att="'+a.id+'">'+esc(a.name)+'</span>'
      + '<span class="att-size">'+fmtSize(a.size||0)+'</span>'
      + '<button class="att-rm" data-att="'+a.id+'" data-tid="'+todoId+'">×</button>'
      + '</div>'
      + imgTag;
  }).join('');

  const uploadLabel = mode==='guest'
    ? '<label class="att-up-btn" for="fu-'+todoId+'">+ LOCAL FILE (max 5MB)</label>'
    : '<label class="att-up-btn" for="fu-'+todoId+'">+ UPLOAD FILE (max 20MB)</label>';

  return '<div class="att-panel open">'
    + '<div class="att-list">'+items+'</div>'
    + '<div class="att-upload-row">'
    + uploadLabel
    + '<input type="file" id="fu-'+todoId+'" class="file-input" data-tid="'+todoId+'" multiple>'
    + '<span class="att-prog" id="ap-'+todoId+'">uploading...</span>'
    + '</div></div>';
}

async function loadImgPreviews(container){
  for(const img of container.querySelectorAll('.att-img[data-path]')){
    const url=await getSignedUrl(img.dataset.path);
    if(url) img.src=url;
  }
}

function bindEvents(tl){
  // hover show expand btns
  tl.querySelectorAll('.todo-item').forEach(item=>{
    const btns=item.querySelectorAll('.expand-btn:not(.vis)');
    item.addEventListener('mouseenter',()=>btns.forEach(b=>b.style.opacity='1'));
    item.addEventListener('mouseleave',()=>btns.forEach(b=>b.style.opacity=''));
  });

  tl.querySelectorAll('.check-area').forEach(el=>el.addEventListener('click',()=>toggleDone(el.dataset.id)));

  tl.querySelectorAll('.edit-btn').forEach(el=>el.addEventListener('click',()=>{
    editingId=el.dataset.id; render();
    requestAnimationFrame(()=>{const i=document.querySelector('.edit-inp');if(i){i.focus();i.select();}});
  }));

  tl.querySelectorAll('.del-btn').forEach(el=>el.addEventListener('click',()=>deleteTodo(el.dataset.id)));

  tl.querySelectorAll('.save-btn').forEach(el=>el.addEventListener('click',()=>{
    const inp=tl.querySelector('.edit-inp');
    const desc=tl.querySelector('.edit-desc-ta');
    if(inp) commitEdit(el.dataset.id,inp.value,desc?.value||'');
  }));

  tl.querySelectorAll('.cancel-btn').forEach(el=>el.addEventListener('click',()=>{editingId=null;render();}));

  tl.querySelectorAll('.edit-inp').forEach(inp=>inp.addEventListener('keydown',e=>{
    if(e.key==='Escape'){editingId=null;render();}
    if(e.key==='Enter'&&!e.shiftKey){
      const desc=tl.querySelector('.edit-desc-ta');
      commitEdit(inp.dataset.id,inp.value,desc?.value||'');
    }
  }));

  tl.querySelectorAll('[data-role]').forEach(btn=>btn.addEventListener('click',e=>{
    e.stopPropagation();
    const id=btn.dataset.id;
    const role=btn.dataset.role;
    if(role==='desc'){
      if(!btn.classList.contains('vis')&&!expandedIds.has(id)){
        // no desc yet — open edit
        editingId=id; render();
        requestAnimationFrame(()=>{
          const ta=document.querySelector('.edit-desc-ta');
          if(ta){ta.focus();}
        });
        return;
      }
      expandedIds.has(id)?expandedIds.delete(id):expandedIds.add(id);
    } else {
      openAttIds.has(id)?openAttIds.delete(id):openAttIds.add(id);
    }
    render();
  }));

  // Attachment interactions
  tl.querySelectorAll('.att-name').forEach(el=>el.addEventListener('click',()=>openAtt(el.dataset.att)));
  tl.querySelectorAll('.att-img').forEach(img=>img.addEventListener('click',()=>openAtt(img.dataset.att)));
  tl.querySelectorAll('.att-rm').forEach(btn=>btn.addEventListener('click',()=>{
    const tid=btn.dataset.tid;
    const attId=btn.dataset.att;
    if(mode==='guest'){ guestDeleteAtt(tid,attId); }
    else {
      const a=findAtt(attId);
      if(a) syncedDeleteAtt({...a,todoId:tid});
    }
  }));

  tl.querySelectorAll('.file-input').forEach(inp=>inp.addEventListener('change',async()=>{
    const tid=inp.dataset.tid;
    const prog=document.getElementById('ap-'+tid);
    if(prog) prog.style.display='inline';
    for(const f of inp.files){
      if(mode==='guest') await guestUpload(tid,f);
      else await syncedUpload(tid,f);
    }
    if(prog) prog.style.display='none';
    inp.value='';
    if(mode==='synced') await loadSynced();
  }));
}

// ─────────────────────────────────────────────────────────────────────────────
// ADD FORM
// ─────────────────────────────────────────────────────────────────────────────
const newDesc=document.getElementById('newDesc');
newDesc.addEventListener('input',()=>{
  newDesc.style.height='auto';
  newDesc.style.height=Math.min(newDesc.scrollHeight,120)+'px';
});

function doAdd(){
  const text=document.getElementById('newTask').value.trim(); if(!text) return;
  addTodo(text,document.getElementById('newPri').value,newDesc.value);
  document.getElementById('newTask').value='';
  newDesc.value=''; newDesc.style.height='auto';
  document.getElementById('newTask').focus();
}
document.getElementById('btnAdd').addEventListener('click',doAdd);
document.getElementById('newTask').addEventListener('keydown',e=>{if(e.key==='Enter') doAdd();});

// ─────────────────────────────────────────────────────────────────────────────
// FILTERS
// ─────────────────────────────────────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn=>btn.addEventListener('click',()=>{
  filter=btn.dataset.f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); render();
}));

document.getElementById('btnClear').addEventListener('click',clearDone);

// ─────────────────────────────────────────────────────────────────────────────
// EXPORT / IMPORT
// ─────────────────────────────────────────────────────────────────────────────
document.getElementById('btnExport').addEventListener('click',()=>{
  const payload={version:2,exported:new Date().toISOString(),mode,todos};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:`todos_${new Date().toISOString().slice(0,10)}.json`});
  a.click(); URL.revokeObjectURL(a.href);
  toast('exported '+todos.length+' tasks');
});

document.getElementById('btnImport').addEventListener('click',()=>document.getElementById('importFile').click());

document.getElementById('importFile').addEventListener('change',async e=>{
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      const rows=(Array.isArray(data)?data:data.todos||[])
        .filter(t=>t?.text?.trim())
        .map(t=>({
          id: mode==='guest'?uid():undefined,
          user_id: mode==='synced'?currentUser.id:undefined,
          text:t.text.trim(),
          description:typeof t.desc==='string'?t.desc:'',
          priority:['low','medium','high'].includes(t.priority)?t.priority:'medium',
          done:typeof t.done==='boolean'?t.done:false,
          created:t.created||new Date().toISOString()
        }));
      if(mode==='guest'){
        todos=[...rows,...todos]; saveGuest(); render();
      } else {
        const clean=rows.map(({id,...r})=>r);
        const {error}=await sb.from('todos').insert(clean);
        if(error) throw error;
        await loadSynced();
      }
      toast('imported '+rows.length+' tasks');
    }catch(err){toast('import failed: '+err.message,'var(--danger)');}
    e.target.value='';
  };
  reader.readAsText(file);
});

  sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:window.location.href}})

document.getElementById('btnSignOut').addEventListener('click',()=>sb.auth.signOut());
document.getElementById('btnUpgrade').addEventListener('click',()=>{
  hide('appScreen'); show('authScreen');
});

// GO

init();
</script>
