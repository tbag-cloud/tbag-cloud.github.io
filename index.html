<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>// TODO</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg:#0a0a0c; --surface:#111116; --surface2:#18181f; --border:#2a2a35;
            --accent:#7c6fff; --accent2:#ff6b6b; --green:#4dffb4;
            --text:#e8e8f0; --muted:#5a5a6e; --danger:#ff4444;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh;padding:40px 20px;}
        #authScreen, #appScreen { display: none; max-width: 720px; margin: 0 auto; }
        #authScreen { max-width: 420px; margin-top: 80px; }
        .add-form{display:flex;flex-direction:column;margin-bottom:24px;border:1px solid var(--border);background:var(--surface);}
        .add-form-top{display:flex;}
        .add-form input[type=text]{flex:1;background:none;border:none;color:var(--text);padding:13px 16px;outline:none;font-family:inherit;}
        #newDesc{background:none;border:none;border-top:1px solid var(--border);color:var(--muted);padding:10px 16px;outline:none;font-family:inherit;resize:none;}
        .todo-item{background:var(--surface);border:1px solid var(--border);margin-bottom:4px;display:grid;grid-template-columns:40px 1fr auto;padding:10px;}
        .todo-desc{font-size:0.75rem;color:var(--muted);margin-top:5px;display:none;}
        .todo-desc.open{display:block;}
        .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface2);padding:10px 20px;border:1px solid var(--border);transition:0.3s;opacity:0;pointer-events:none;z-index:1000;}
        .toast.show{opacity:1;}
        .sync-dot{width:10px;height:10px;border-radius:50%;background:var(--muted);display:inline-block;}
        .sync-dot.synced{background:var(--green);}
        button{cursor:pointer;font-family:inherit;}
    </style>
</head>
<body>

<div id="authScreen">
    <h1>// <span>TODO</span></h1>
    <p style="margin: 20px 0; color: var(--muted);">Sign in to sync or use as guest.</p>
    <button id="btnGoogle" style="width:100%; padding:15px; margin-bottom:10px;">SIGN IN WITH GOOGLE</button>
    <button id="btnGuest" style="width:100%; padding:10px; background:none; border:1px dashed var(--border); color:var(--muted);">CONTINUE AS GUEST</button>
</div>

<div id="appScreen">
    <header style="margin-bottom:30px;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h1>// <span>TODO</span></h1>
            <div>
                <span id="syncDot" class="sync-dot"></span>
                <span id="modeBadge" style="font-size:0.7rem; margin-left:5px;">GUEST</span>
                <button id="btnSignOut" style="display:none; margin-left:10px;">SIGN OUT</button>
            </div>
        </div>
        <div id="statsLabel" style="font-size:0.7rem; color:var(--muted); margin-top:5px;">0/0 DONE</div>
    </header>

    <div class="add-form">
        <div class="add-form-top">
            <input type="text" id="newTask" placeholder="What needs doing?">
            <select id="newPri" style="background:none; color:var(--muted); border:none; border-left:1px solid var(--border); padding:0 10px;">
                <option value="low">LOW</option>
                <option value="medium" selected>MED</option>
                <option value="high">HIGH</option>
            </select>
            <button id="btnAdd" style="padding:0 20px; background:var(--accent); border:none; color:white;">+</button>
        </div>
        <textarea id="newDesc" placeholder="Add details..."></textarea>
    </div>

    <div id="todoList"></div>

    <div id="bottomBar" style="display:none; margin-top:20px; border-top:1px solid var(--border); padding-top:10px; justify-content:space-between;">
        <span id="bottomCount"></span>
        <button id="btnClear" style="background:none; border:none; color:var(--danger); font-size:0.7rem;">CLEAR DONE</button>
    </div>
</div>

<div id="toast" class="toast"></div>

<script src="script.js"></script>
</body>
</html>
