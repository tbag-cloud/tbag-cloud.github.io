<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const SUPA_URL = 'https://hxkjwebubmdqjzwmnvrh.supabase.co';
const SUPA_KEY = 'sb_publishable_iZkIPeb7P6Eb8RCXC1hNOQ_GhIUlnj0';

// ── STATE ─────────────────────────────────────────────────────────────────────
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

let mode = 'guest';
let currentUser = null;
let todos = [];
let attMap = {};
let filter = 'all';
let searchQ = '';
let editingId = null;
let confirmDeleteId = null;
let expandedIds = new Set();
let openAttIds = new Set();

// ── UTILS ─────────────────────────────────────────────────────────────────────
const esc = s => (s||'')
  .replace(/&/g,'&amp;')
  .replace(/</g,'&lt;')
  .replace(/>/g,'&gt;')
  .replace(/"/g,'&quot;');

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);

const fmtDate = iso =>
  new Date(iso).toLocaleDateString('en-GB',{day:'2-digit',month:'short'}).toUpperCase();

const mimeIcon = m =>
  (m || '').startsWith('image/') ? '🖼' :
  m === 'application/pdf' ? '📄' :
  (m || '').startsWith('video/') ? '🎬' :
  (m || '').startsWith('audio/') ? '🎵' :
  (m || '').includes('zip') ? '🗜' : '📎';

// ── AUTH ──────────────────────────────────────────────────────────────────────
sb.auth.onAuthStateChange(async (event, session) => {

  if (session) {
    mode = 'synced';
    currentUser = session.user;

    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'block';

    await loadSynced();

  } else {
    mode = 'guest';
    currentUser = null;

    document.getElementById('appScreen').style.display = 'none';
    document.getElementById('authScreen').style.display = 'block';
  }
});

// OAuth redirect handler
(async () => {
  const hash = window.location.hash;

  if (hash && hash.includes('access_token')) {
    const params = new URLSearchParams(hash.replace(/^#+/, ''));
    await sb.auth.setSession({
      access_token: params.get('access_token'),
      refresh_token: params.get('refresh_token')
    });
    history.replaceState(null, '', window.location.pathname);
  }

  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    document.getElementById('authScreen').style.display = 'block';
  }
})();

// ── LOAD SYNCED (FIXED) ───────────────────────────────────────────────────────
async function loadSynced() {
  const { data: tData, error: tErr } = await sb
    .from('todos')
    .select('*')
    .order('created_at', { ascending: false });

  const { data: aData, error: aErr } = await sb
    .from('attachments')
    .select('*')
    .order('created_at', { ascending: true });

  if (tErr) {
    console.error(tErr);
    return;
  }

  if (aErr) {
    console.error(aErr);
    return;
  }

  todos = (tData || []).map(t => ({
    id: t.id,
    text: t.text || '',
    desc: t.description || '',
    priority: t.priority || 'medium',
    done: !!t.done,
    created: t.created_at
  }));

  attMap = {};
  (aData || []).forEach(a => {
    (attMap[a.todo_id] = attMap[a.todo_id] || []).push({
      id: a.id,
      name: a.name,
      size: a.size,
      mime: a.mime_type,
      path: a.path
    });
  });

  render();
}

// ── BASIC RENDER (unchanged logic, stable) ─────────────────────────────────────
function render() {
  const list = document.getElementById('todoList');
  list.innerHTML = '';

  todos.forEach(t => {
    const div = document.createElement('div');
    div.className = 'todo-item';

    div.innerHTML = `
      <div>${esc(t.text)}</div>
    `;

    list.appendChild(div);
  });
}

// ── ADD TODO ──────────────────────────────────────────────────────────────────
async function addTodo(text, priority, desc) {
  if (!text.trim()) return;

  if (mode === 'guest') {
    todos.unshift({
      id: uid(),
      text,
      desc,
      priority,
      done: false,
      created: new Date().toISOString()
    });
    render();
  } else {
    await sb.from('todos').insert({
      user_id: currentUser.id,
      text,
      description: desc,
      priority
    });

    await loadSynced();
  }
}

// ── EVENTS ────────────────────────────────────────────────────────────────────
document.getElementById('btnAdd').addEventListener('click', () => {
  addTodo(
    document.getElementById('newTask').value,
    document.getElementById('newPri').value,
    document.getElementById('newDesc').value
  );
});

</script>
</body>
</html>
